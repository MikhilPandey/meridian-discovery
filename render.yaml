# Render blueprint — one-click deploy of the FastAPI backend.
# Visit https://render.com/deploy and point it at this repo.
services:
  - type: web
    name: meridian-discovery-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: CORS_ORIGINS
        sync: false   # set this in the Render dashboard to your Vercel URL
